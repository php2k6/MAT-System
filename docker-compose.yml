name: mat-system

services:
  db:
    image: postgres:15-alpine
    container_name: mat-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: mat_system
    # No ports mapped to the host (Strict Security - No Leaking)
    # The database is only accessible to containers inside this logical network.
    volumes:
      - mat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mat_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mat-redis
    restart: always
    # No ports mapped to the host (Strict Security)
    # Allows Fyers WS caching away from external snoopers
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SERVER_CORS_ORIGIN: "*"
      DATABASE_CONNECTION_URI: "postgres://postgres:yourpassword@db:5432/evolution"
      REDIS_URI: "redis://redis:6379"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"] || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mat-backend
    restart: always
    # No ports mapped to the host (Internal Reverse Proxy via Frontend handles this)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    # Uses the shared exact env configurations
    env_file:
      - backend/.env
    # Optionally override Postgres/Redis URLs inside docker networking if .env specifies localhost explicitly
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:yourpassword@db:5432/mat_system
      - REDIS_URL=redis://redis:6379/0
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
    # Map logs dynamically so they stream securely into your host machine's /logs folder
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mat-frontend
    restart: always
    depends_on:
      - backend
    # This acts as your secure Edge Router (Nginx)
    # Binds internally 80 to your Local PC's 80.
    ports:
      - "80:80"

volumes:
  mat_pgdata:
