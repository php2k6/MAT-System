server {
    listen 80;
    server_name _;
    server_tokens off;

    # Basic Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 5M;

    # React Frontend Router (Single Page Application fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Reverse Proxy & WebSocket Upgrades
    location /api/ {
        # 'backend' matches the service name defined in docker-compose.yml
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        # Standard Proxy Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket required Headers (handles the ws:// feed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts to support enduring Fyers tick websockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }

    # FastAPI Swagger UI & OpenAPI spec
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle Nginx Error Codes Gracefully
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
